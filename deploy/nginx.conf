# nginx — sert le frontend Angular et proxifie l'API Django (Gunicorn).
# Tout est servi sur le MÊME domaine → cookies de session + CSRF same-origin.
# Installer : sudo cp deploy/nginx.conf /etc/nginx/sites-available/foxugly
#            sudo ln -s /etc/nginx/sites-available/foxugly /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# TLS : certificat wildcard *.foxugly.com déjà émis (Let's Encrypt, challenge DNS-01).
# Instance partagée avec quizonline : ce vhost (foxugly.com) coexiste avec celui de
# quizonline ; Gunicorn foxugly écoute sur :8001 (quizonline garde :8000).

upstream foxugly_app {
    server 127.0.0.1:8001;
}

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name foxugly.com www.foxugly.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                       # nginx < 1.25.1 : remplacer par « listen 443 ssl http2; »
    server_name foxugly.com www.foxugly.com;

    ssl_certificate     /etc/letsencrypt/live/foxugly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxugly.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;       # uploads de logos partenaires

    # --- Compression ---
    # Les assets du frontend sont pré-compressés en CI (.br/.gz) → servis tels quels
    # via *_static (aucun CPU au runtime). gzip/brotli dynamiques = repli (API JSON…).
    gzip on;
    gzip_static on;                 # sert les .gz pré-compressés s'ils existent
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml application/wasm
               font/ttf font/otf application/vnd.ms-fontobject;

    # Brotli — meilleure compression que gzip pour les assets.
    # ⚠ Nécessite le module ngx_brotli chargé dans le nginx.conf principal
    #   (Ubuntu : sudo apt-get install -y libnginx-mod-brotli ; voir DEPLOY.md).
    #   Sans le module, « nginx -t » échoue → installer le module AVANT de recharger.
    brotli on;
    brotli_comp_level 5;
    brotli_static on;               # sert les .br pré-compressés s'ils existent
    brotli_types text/plain text/css application/json application/javascript
                 application/xml+rss application/atom+xml image/svg+xml
                 application/wasm font/ttf font/otf application/vnd.ms-fontobject;

    root /opt/foxugly/frontend/dist/frontend/browser;
    index index.html;

    # --- API & back-office Django (proxy vers Gunicorn) ---
    location ~ ^/(api|api-auth|admin)/ {
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Statics Django (admin/DRF), servis par WhiteNoise via Gunicorn ---
    location /static/ {
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Médias (logos partenaires) servis depuis le disque ---
    location /media/ {
        alias /opt/foxugly/backend/media/;
        access_log off;
        expires 30d;
    }

    # --- Frontend Angular (SPA fallback) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
