# nginx — sert le frontend Angular et proxifie l'API Django (Gunicorn).
# Tout est servi sur le MÊME domaine → cookies de session + CSRF same-origin.
# Installer (pattern sites-available + symlink, cohérent avec les autres sites de la box) :
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/foxugly.com
#   sudo ln -sf /etc/nginx/sites-available/foxugly.com /etc/nginx/sites-enabled/foxugly.com
#   sudo nginx -t && sudo systemctl reload nginx
#   (Le vhost foxugly.com coexiste avec quizonline et les autres sous-domaines.)
# TLS : certificat wildcard *.foxugly.com déjà émis (Let's Encrypt, challenge DNS-01).
# Instance partagée avec quizonline : ce vhost (foxugly.com) coexiste avec celui de
# quizonline ; Gunicorn foxugly écoute sur :8004 (quizonline garde :8000).

upstream foxugly_app {
    server 127.0.0.1:8004;
}

# Rate-limiting du formulaire de contact : 5 requêtes/minute par IP.
# (contexte http — valide ici car ce fichier est inclus dans le bloc http{}.)
limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name foxugly.com www.foxugly.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    # Forme « listen … http2 » : compatible nginx ancien ET récent (un simple
    # warning de dépréciation sur ≥ 1.25.1, pas une erreur).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foxugly.com www.foxugly.com;

    ssl_certificate     /etc/letsencrypt/live/foxugly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxugly.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;       # uploads de logos partenaires

    # --- Compression ---
    # Les assets du frontend sont pré-compressés en CI (.br/.gz) → servis tels quels
    # via *_static (aucun CPU au runtime). gzip/brotli dynamiques = repli (API JSON…).
    gzip on;
    gzip_static on;                 # sert les .gz pré-compressés s'ils existent
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml application/wasm
               font/ttf font/otf application/vnd.ms-fontobject;

    # Brotli — DÉSACTIVÉ (module ngx_brotli non disponible dans les dépôts de la box).
    # gzip ci-dessus suffit. Pour l'activer plus tard : installer le module
    # (paquet selon l'OS, p.ex. via nginx.org ou compilation ngx_brotli), puis
    # décommenter ces lignes et recharger nginx. Les .br pré-compressés en CI sont
    # déjà dans le bundle, prêts pour brotli_static le jour où le module est là.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_static on;
    # brotli_types text/plain text/css application/json application/javascript
    #              application/xml+rss application/atom+xml image/svg+xml
    #              application/wasm font/ttf font/otf application/vnd.ms-fontobject;

    root /var/www/django_websites/foxugly/frontend/dist/frontend/browser;
    index index.html;

    # --- Cache ---
    # index.html : référence les assets hashés → toujours revalidé (ETag → 304).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    # Assets hashés par Angular à la racine (nom-HASH.js / .css) : immuables 1 an.
    # `^/[^/]+-…` n'attrape que la racine → n'impacte ni /static/ ni /media/.
    location ~ "^/[^/]+-[A-Za-z0-9]{8,}\.(?:js|css)$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # --- Formulaire de contact : rate-limité (anti-spam) ---
    # `location =` (exact) prime sur la regex ci-dessous. 5 req/min/IP, petit burst,
    # 429 (Too Many Requests) au-delà.
    location = /api/contact/ {
        limit_req zone=contact burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Sonde de santé (monitoring externe : UptimeRobot…) ---
    # Proxy vers l'app (vérifie toute la chaîne + la DB). access_log coupé pour
    # éviter le bruit des pings réguliers. Avec ou sans slash final.
    location ~ ^/health/?$ {
        access_log off;
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API & back-office Django (proxy vers Gunicorn) ---
    location ~ ^/(api|api-auth|admin)/ {
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Statics Django (admin/DRF), servis par WhiteNoise via Gunicorn ---
    location /static/ {
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Médias (logos partenaires) servis depuis le disque ---
    location /media/ {
        alias /var/www/django_websites/foxugly/backend/media/;
        access_log off;
        expires 30d;
    }

    # --- Frontend Angular (SPA fallback) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
