# nginx — sert le frontend Angular et proxifie l'API Django (Gunicorn).
# Tout est servi sur le MÊME domaine → cookies de session + CSRF same-origin.
# Installer : sudo cp deploy/nginx.conf /etc/nginx/sites-available/foxugly
#            sudo ln -s /etc/nginx/sites-available/foxugly /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# TLS : utiliser certbot (sudo certbot --nginx -d foxugly.com -d www.foxugly.com)
#       qui ajoutera automatiquement le bloc 443 + la redirection 80→443.

upstream foxugly_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name foxugly.com www.foxugly.com;

    client_max_body_size 10M;   # uploads de logos partenaires

    root /opt/foxugly/frontend/dist/frontend/browser;
    index index.html;

    # --- API & back-office Django (proxy vers Gunicorn) ---
    location ~ ^/(api|api-auth|admin)/ {
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Statics Django (admin/DRF), servis par WhiteNoise via Gunicorn ---
    location /static/ {
        proxy_pass http://foxugly_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Médias (logos partenaires) servis depuis le disque ---
    location /media/ {
        alias /opt/foxugly/backend/media/;
        access_log off;
        expires 30d;
    }

    # --- Frontend Angular (SPA fallback) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
