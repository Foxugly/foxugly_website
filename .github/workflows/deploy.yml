name: CI & Déploiement

# Sur push main : tests (backend + frontend + e2e) PUIS, s'ils passent, déploiement
# via le pattern S3-bundle (build CI → S3 → SSM → instance).
#
# Secrets requis (pour le déploiement uniquement) :
#   AWS_DEPLOY_ROLE_ARN  rôle IAM assumé par OIDC (s3:PutObject, ssm:SendCommand…)
#   EC2_INSTANCE_ID      ex : i-0123456789abcdef0
#   AWS_REGION           optionnel (défaut : eu-west-1)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-1' }}
  BUCKET: foxugly-deploy
  # Opt-in Node 24 pour les actions JS encore déclarées en node20
  # (aws-actions/configure-aws-credentials@v5 n'a pas encore de release node24).
  # Évite le warning de dépréciation ; GitHub forcera ce comportement le 16/06/2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Lint backend (ruff)
        working-directory: backend
        run: |
          pip install ruff
          ruff check .

  # ---------------------------------------------------------------------------
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: |
          npm ci
          npx ng lint   # n'échoue que sur les erreurs ; les warnings a11y sont tolérés

  # ---------------------------------------------------------------------------
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Tests backend (Django)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python manage.py test content -v2

  # ---------------------------------------------------------------------------
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Tests unitaires frontend (Vitest)
        working-directory: frontend
        run: |
          npm ci
          npx ng test --watch=false

  # ---------------------------------------------------------------------------
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Démarrer le backend (migrate + seed + admin)
        working-directory: backend
        env:
          DEBUG: 'true'   # DEBUG défaut False désormais ; dev/e2e l'activent
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py seed_content
          DJANGO_SUPERUSER_PASSWORD=admin12345 \
            python manage.py createsuperuser --noinput --username admin --email admin@foxugly.com || true
          nohup python manage.py runserver 127.0.0.1:8001 --noreload > /tmp/backend.log 2>&1 &

      - name: Démarrer le frontend (ng serve + proxy)
        working-directory: frontend
        run: |
          npm ci
          nohup npm start > /tmp/frontend.log 2>&1 &

      - name: Attendre que les serveurs répondent
        run: |
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8001/api/pages/ >/dev/null && break || sleep 2; done
          for i in $(seq 1 60); do curl -sf http://localhost:4200 >/dev/null && break || sleep 2; done
          curl -sf http://127.0.0.1:8001/api/pages/ >/dev/null && echo "backend OK"
          curl -sf http://localhost:4200 >/dev/null && echo "frontend OK"

      - name: Tests e2e (Playwright)
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Logs serveurs (si échec)
        if: failure()
        run: |
          echo "=== backend ==="; tail -50 /tmp/backend.log || true
          echo "=== frontend ==="; tail -50 /tmp/frontend.log || true

  # ---------------------------------------------------------------------------
  deploy:
    needs: [lint-backend, lint-frontend, backend-tests, frontend-tests, e2e-tests]
    runs-on: ubuntu-latest
    # OIDC sub is repo:Foxugly/foxugly_website:environment:production (matches the
    # foxugly-deploy role trust). Also enables GitHub environment protection rules.
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Tag de la release Sentry (SHA du commit)
        run: |
          # Frontend : remplace le placeholder dans sentry.config.ts (build statique).
          sed -i "s|export const SENTRY_RELEASE = '';|export const SENTRY_RELEASE = '${GITHUB_SHA}';|" \
            frontend/src/app/core/sentry.config.ts
          # Backend : fichier RELEASE lu par settings.py (_sentry_release).
          echo "${GITHUB_SHA}" > backend/RELEASE

      - name: Build du frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build      # → frontend/dist/frontend/browser

      - name: Pré-compression des assets (gzip + brotli)
        run: |
          sudo apt-get update && sudo apt-get install -y brotli
          # Crée un .gz et un .br à côté de chaque asset compressible → servis par
          # nginx via gzip_static / brotli_static (aucun CPU au runtime).
          find frontend/dist -type f \
            \( -name '*.js' -o -name '*.css' -o -name '*.html' -o -name '*.svg' \
               -o -name '*.json' -o -name '*.wasm' -o -name '*.txt' -o -name '*.xml' \
               -o -name '*.ico' \) -print0 \
          | while IFS= read -r -d '' f; do
              gzip -9 -k -f "$f"
              brotli -q 11 -f "$f"
            done

      - name: Assemblage du bundle
        run: |
          BUNDLE="foxugly-${GITHUB_SHA::7}.tar.gz"
          echo "BUNDLE=$BUNDLE" >> "$GITHUB_ENV"
          tar czf "$BUNDLE" backend frontend/dist deploy

      - name: Configurer les identifiants AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload du bundle vers S3
        run: aws s3 cp "$BUNDLE" "s3://$BUCKET/builds/$BUNDLE"

      - name: Déploiement via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          cat > ssm-params.json <<JSON
          { "commands": [
            "set -eu",
            "export AWS_SHARED_CREDENTIALS_FILE=/dev/null AWS_CONFIG_FILE=/dev/null",
            "aws s3 cp s3://$BUCKET/builds/$BUNDLE /tmp/$BUNDLE --region $AWS_REGION",
            "mkdir -p /var/www/django_websites/foxugly",
            "tar xzf /tmp/$BUNDLE -C /var/www/django_websites/foxugly",
            "chown -R django:www-data /var/www/django_websites/foxugly",
            "bash /var/www/django_websites/foxugly/deploy/deploy.sh",
            "rm -f /tmp/$BUNDLE"
          ]}
          JSON

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy foxugly ${GITHUB_SHA::7}" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId : $CMD_ID"

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          echo "=== STDOUT ==="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
          echo "=== STDERR ==="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
          echo "Statut final : $STATUS"
          test "$STATUS" = "Success"

      - name: Healthcheck du site
        run: |
          set -uo pipefail
          URL="https://www.foxugly.com/health"
          for i in $(seq 1 10); do
            CODE=$(curl -fsS -o /dev/null -w "%{http_code}" "$URL" || echo 000)
            echo "Tentative $i/10 → HTTP $CODE"
            [ "$CODE" = "200" ] && { echo "✓ $URL répond 200"; exit 0; }
            sleep 6
          done
          echo "✗ Healthcheck échoué : $URL ne répond pas 200"
          exit 1
