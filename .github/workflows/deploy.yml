name: Déploiement

# Déploie sur push vers main (ou manuellement) via AWS SSM Run Command.
# Le serveur (EC2) exécute deploy/deploy.sh : git pull → backend → frontend → restart.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   AWS_DEPLOY_ROLE_ARN  rôle IAM assumé par OIDC (ssm:SendCommand, ssm:GetCommandInvocation)
#   EC2_INSTANCE_ID      ex : i-0123456789abcdef0
#   AWS_REGION           optionnel (défaut : eu-west-1)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC pour configure-aws-credentials
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configurer les identifiants AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'eu-west-1' }}

      - name: Lancer le déploiement via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy foxugly ${GITHUB_SHA::7}" \
            --parameters 'commands=["bash /opt/foxugly/deploy/deploy.sh main"]' \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId : $CMD_ID"

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          echo "=== STDOUT ==="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
          echo "=== STDERR ==="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
          echo "Statut final : $STATUS"
          test "$STATUS" = "Success"
